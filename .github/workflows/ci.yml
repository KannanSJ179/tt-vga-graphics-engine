name: TinyTapeout CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Icarus Verilog
        run: sudo apt-get update && sudo apt-get install -y iverilog

      - name: Run Simulation
        run: |
          cd test
          make sim

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate info.yaml
        run: |
          pip install pyyaml
          python -c "import yaml; yaml.safe_load(open('info.yaml'))"

  gds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dummy GDS pass
        run: echo "GDS placeholder (passes)"
