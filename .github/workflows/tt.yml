name: TinyTapeout

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y iverilog make
      - name: Run simulation
        run: |
          cd test
          make sim

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate info.yaml
        run: |
          pip install pyyaml
          python -c "import yaml; yaml.safe_load(open('info.yaml'))"

  gds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run OpenLane flow
        uses: TinyTapeout/tt-gds-action@v1
